    </radialGradient>
  </defs>

  <rect x="26" y="45" width="10" height="26" rx="5" fill="#1A3A6A"/>
  <rect x="42" y="30" width="10" height="41" rx="5" fill="#1E4A88"/>
  <rect x="58" y="18" width="10" height="53" rx="5" fill="#FFD25D"/>
  <rect x="74" y="25" width="10" height="46" rx="5" fill="#FF3B30"/>
