# Base compose: soruyorum.online tam ayrim (Traefik label'lari override dosyasinda)
name: soruyorum

services:
  soruyorum-portal:
    image: soruyorum-portal:local
    restart: unless-stopped
    env_file:
      - /etc/soruyorum/portal-api.env
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
      args:
        NEXT_PUBLIC_ENABLED_EVENT_TYPES: quiz
        NEXT_PUBLIC_SITE_VARIANT: soruyorum
        NEXT_PUBLIC_DEMO_MODE: "true"
        NEXT_PUBLIC_UPGRADE_CONTACT_EMAIL: info@soruyorum.online
        NEXT_PUBLIC_UPGRADE_CONTACT_PHONE: +90 (532) 222-8040
        NEXT_PUBLIC_UPGRADE_CONTACT_PHONES: +90 (532) 222-8040 | +90 (212) 503-3939
        NEXT_PUBLIC_UPGRADE_CONTACT_ADDRESS: Istanbul, Kavacik Mh., Fatih Sultan Mehmet Cd. Tonoglu Plaza No:3 Kat:4, Beykoz/Istanbul
    ports:
      - "127.0.0.1:3101:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://soruyorum-api-server:4000
      - NEXT_PUBLIC_ENABLED_EVENT_TYPES=quiz
      - NEXT_PUBLIC_SITE_VARIANT=soruyorum
      - NEXT_PUBLIC_DEMO_MODE=true
      - NEXT_PUBLIC_UPGRADE_CONTACT_EMAIL=info@soruyorum.online
      - NEXT_PUBLIC_UPGRADE_CONTACT_PHONE=+90 (532) 222-8040
      - NEXT_PUBLIC_UPGRADE_CONTACT_PHONES=+90 (532) 222-8040 | +90 (212) 503-3939
      - NEXT_PUBLIC_UPGRADE_CONTACT_ADDRESS=Istanbul, Kavacik Mh., Fatih Sultan Mehmet Cd. Tonoglu Plaza No:3 Kat:4, Beykoz/Istanbul
      - PUBLIC_PLANS_ENABLED=false
    depends_on:
      - soruyorum-api-server

  soruyorum-api-server:
    image: soruyorum-api-server:local
    restart: unless-stopped
    env_file:
      - /etc/soruyorum/portal-api.env
    build:
      context: .
      dockerfile: services/api-server/Dockerfile
    ports:
      - "127.0.0.1:4100:4000"
    environment:
      - NODE_ENV=production
      - REQUEST_BODY_LIMIT=50mb
      - ALLOWED_EVENT_TYPES=quiz
    depends_on:
      - soruyorum-redis

  soruyorum-redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - /etc/soruyorum/portal-api.env
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - soruyorum_redis_data:/data

  soruyorum-static:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./public_html:/usr/share/nginx/html:ro
      - ./public_html/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8180:80"

volumes:
  soruyorum_redis_data:
    external: true
    name: site_soruyorum_redis_data
